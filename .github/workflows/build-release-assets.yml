name: Build Release Assets

on:
  push:
    tags:
      - 'v*'

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: build-release-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-assets:
    name: Build release archives
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image repo name
        id: image_repo
        uses: ./.github/actions/ci-image-repo

      - name: Read version from defines.h
        id: defines_version
        uses: ./.github/actions/ci-version-from-defines

      - name: Verify tag version matches defines.h
        shell: bash
        run: |
          set -euo pipefail
          # Guard against publishing archives for a tag that does not match source version.
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "${{ steps.defines_version.outputs.version }}" ]]; then
            echo "Tag version (v${tag_version}) does not match defines.h version (${{ steps.defines_version.outputs.version }})." >&2
            exit 1
          fi

      - name: Log in to GHCR (best effort)
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deps build image
        id: deps_image
        uses: ./.github/actions/ci-resolve-deps-image
        with:
          image_repo: ${{ steps.image_repo.outputs.image_repo }}
          ttl_days: "30"
          can_push: "true"
          update_latest_alias: "false"

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          # Build all release archives inside the resolved, dependency-pinned builder image.
          docker run --rm -v "$PWD":/workspace -w /workspace "${{ steps.deps_image.outputs.image_ref }}" \
            bash -lc '
              set -euo pipefail
              # This script writes the 5 distributable archives into /workspace/fedora41.
              cd /workspace
              RELEASE_WORKSPACE=/workspace bash .github/docker/fedora41/release-all.sh
            '

      - name: Resolve expected release assets
        id: assets
        uses: ./.github/actions/ci-release-assets
        with:
          version: ${{ steps.defines_version.outputs.version }}

      - name: Verify expected archives
        uses: ./.github/actions/ci-verify-assets
        with:
          base_dir: fedora41
          asset_list_json: ${{ steps.assets.outputs.asset_list_json }}

      - name: Upload artifact (client SDL2 Linux)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.assets.outputs.asset_1 }}
          path: fedora41/${{ steps.assets.outputs.asset_1 }}
          if-no-files-found: error

      - name: Upload artifact (client SDL2 Win32)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.assets.outputs.asset_2 }}
          path: fedora41/${{ steps.assets.outputs.asset_2 }}
          if-no-files-found: error

      - name: Upload artifact (client X11 Linux)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.assets.outputs.asset_3 }}
          path: fedora41/${{ steps.assets.outputs.asset_3 }}
          if-no-files-found: error

      - name: Upload artifact (server X11 Linux)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.assets.outputs.asset_4 }}
          path: fedora41/${{ steps.assets.outputs.asset_4 }}
          if-no-files-found: error

      - name: Upload artifact (client Win32)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.assets.outputs.asset_5 }}
          path: fedora41/${{ steps.assets.outputs.asset_5 }}
          if-no-files-found: error
